name: Deploy to Home Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd /home/kutluhan/Apartment-Management-System
          git pull

      - name: Rebuild backend (if changed)
        run: |
          cd /home/kutluhan/Apartment-Management-System
          if git diff --name-only HEAD~1 HEAD | grep -q "^backend/"; then
            docker compose up -d --build backend
            echo "✅ Backend rebuild edildi."
          else
            echo "⏭ Backend değişmedi, atlandı."
          fi

      - name: Rebuild frontend (if changed)
        run: |
          cd /home/kutluhan/Apartment-Management-System
          if git diff --name-only HEAD~1 HEAD | grep -q "^frontend/"; then
            cd /home/kutluhan/reverse-proxy
            docker compose up -d --build cumhuriyet
            echo "✅ Frontend rebuild edildi."
          else
            echo "⏭ Frontend değişmedi, atlandı."
          fi

      - name: Verify containers
        run: |
          sleep 8
          docker ps --filter "name=cumhuriyet" --format "{{.Names}}: {{.Status}}"
